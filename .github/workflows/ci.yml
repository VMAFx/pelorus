name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: libpelorus (build · test · format · tidy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build glslang-tools clang clang-format clang-tidy pkg-config
      - name: Configure + build
        run: meson setup build && ninja -C build
      - name: Test (fast suite — interop ABI + shader compile)
        run: meson test -C build --suite=fast --print-errorlogs
      - name: clang-format (touched-tree clean)
        run: |
          fmt=$(find libpelorus -name '*.c' -o -name '*.h')
          clang-format --dry-run --Werror $fmt
      - name: clang-tidy
        run: clang-tidy -p build libpelorus/src/*.c

  ffmpeg-stack:
    name: ffmpeg patch stack (apply · configure · compile filters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config nasm yasm git wget ca-certificates gnupg
      - name: Install Vulkan SDK (LunarG — current headers + glslang + shaderc)
        run: |
          # Ubuntu's libvulkan-dev headers are older than FFmpeg n8.1 requires
          # ("vulkan requested but not found"); the LunarG SDK ships current
          # Vulkan-Headers + glslang + shaderc (spirv_library) together.
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          # The vulkan-sdk metapackage bundles current Vulkan-Headers (Ubuntu's
          # are < FFmpeg's min) AND shaderc/glslang (spirv_library). Install it
          # ALONE — adding Ubuntu's libshaderc-dev in the same transaction
          # collides with LunarG's shaderc deb (dpkg unpack conflict).
          sudo apt-get install -y vulkan-sdk
          echo "vulkan: $(pkg-config --modversion vulkan 2>/dev/null || echo '?'); shaderc: $(pkg-config --modversion shaderc 2>/dev/null || echo '?')"
      - name: Build + install libpelorus (to /usr so pkg-config finds it)
        run: |
          meson setup build --prefix=/usr
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig
          pkg-config --exists libpelorus && echo "libpelorus $(pkg-config --modversion libpelorus) OK"
      - name: Checkout FFmpeg n8.1.1
        run: git clone --branch n8.1.1 --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg
      - name: Apply Pelorus patch stack (git am --3way)
        working-directory: ffmpeg
        run: |
          git config user.name CI && git config user.email ci@vmafx.invalid
          while read -r p; do
            case "$p" in ''|\#*) continue;; esac
            echo "applying $p"
            git am --3way "$GITHUB_WORKSPACE/ffmpeg-patches/$p"
          done < "$GITHUB_WORKSPACE/ffmpeg-patches/series.txt"
      - name: Configure (Vulkan + libpelorus)
        working-directory: ffmpeg
        run: |
          pkg-config --exists libpelorus && echo "libpelorus $(pkg-config --modversion libpelorus) OK"
          # --enable-libshaderc turns on spirv_library (the runtime GLSL->SPIR-V
          # compiler); it defaults OFF, and without it every vulkan-compute
          # filter (incl. pelorus) is disabled. The filters then auto-enable.
          # NOTE: do NOT --disable-programs — the next step links the `ffmpeg`
          # binary to exercise the libpelorus link (the real gate); disabling
          # programs removes that target ("No rule to make target 'ffmpeg'").
          ./configure --enable-vulkan --enable-libshaderc --disable-doc \
            || { echo '::group::config.log tail'; tail -80 ffbuild/config.log; echo '::endgroup::'; exit 1; }
      - name: Show Vulkan / SPIR-V / libpelorus detection
        working-directory: ffmpeg
        run: |
          grep -E 'CONFIG_(VULKAN|LIBSHADERC|LIBGLSLANG|SPIRV_COMPILER|SPIRV_LIBRARY|PELORUS)' config.h config_components.h || true
          echo "::group::config.log — libpelorus + pelorus filter resolution"
          grep -iE 'libpelorus|pelorus_(deband|analyze)_vulkan_filter' ffbuild/config.log | tail -60 || true
          echo "::endgroup::"
      - name: Confirm filters enabled
        working-directory: ffmpeg
        run: |
          grep -q 'CONFIG_PELORUS_DEBAND_VULKAN_FILTER 1' config_components.h \
            && grep -q 'CONFIG_PELORUS_ANALYZE_VULKAN_FILTER 1' config_components.h \
            || { echo "Pelorus filters were DISABLED at configure (likely spirv_library not detected)."; \
                 grep -iE 'spirv|shaderc|glslang|vulkan' ffbuild/config.log | tail -40; exit 1; }
      - name: Build + LINK ffmpeg (catches link errors the .o-only build misses)
        working-directory: ffmpeg
        run: |
          # Linking the binary is the real gate: require_pkg_config adds cflags
          # but the filter also needs -lpelorus on the link (add_extralibs), which
          # a compile-only `make …o` would never exercise.
          make -j"$(nproc)" ffmpeg
      - name: Smoke — filters registered in the linked binary
        working-directory: ffmpeg
        run: |
          ./ffmpeg -hide_banner -filters 2>/dev/null | grep pelorus_deband_vulkan
          ./ffmpeg -hide_banner -filters 2>/dev/null | grep pelorus_analyze_vulkan

  docs:
    name: docs + changelog hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Changelog fragments render cleanly
        run: bash scripts/release/concat-changelog-fragments.sh --check
      - name: Every ADR has an index row
        run: |
          missing=0
          for adr in docs/adr/[0-9]*.md; do
            n=$(basename "$adr" .md); n=${n%%-*}
            [ "$n" = "0000" ] && continue   # 0000 is the template, not indexed
            grep -q "\[$n\](" docs/adr/README.md || { echo "ADR $n missing from index"; missing=1; }
          done
          exit $missing
